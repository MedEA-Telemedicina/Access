
<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Access Clienti – MedEA Telemedicina</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
* { margin: 0; padding: 0; box-sizing: border-box; }

@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

:root {
    --primary: #2563eb;
    --primary-dark: #1d4ed8;
    --primary-light: #eff6ff;
    --primary-ring: rgba(37,99,235,0.15);
    --bg: #f8fafc;
    --bg-alt: #f1f5f9;
    --white: #ffffff;
    --text: #0f172a;
    --text-secondary: #475569;
    --text-muted: #94a3b8;
    --border: #e2e8f0;
    --border-light: #f1f5f9;
    --danger: #ef4444;
    --danger-light: #fef2f2;
    --success: #10b981;
    --success-light: #ecfdf5;
    --warning: #f59e0b;
    --warning-light: #fffbeb;
    --radius: 10px;
    --radius-lg: 14px;
    --radius-xl: 20px;
    --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
    --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
    --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.07), 0 2px 4px -2px rgba(0,0,0,0.05);
    --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.08), 0 4px 6px -4px rgba(0,0,0,0.04);
    --shadow-xl: 0 20px 25px -5px rgba(0,0,0,0.1), 0 8px 10px -6px rgba(0,0,0,0.06);
    --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
}

html { scroll-behavior: smooth; }

body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
}

/* ── ANIMATIONS ── */
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes slideUp { from { opacity: 0; transform: translateY(12px) scale(0.98); } to { opacity: 1; transform: none; } }
@keyframes slideDown { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: none; } }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }
@keyframes toastIn { from { transform: translateX(120%); opacity: 0; } to { transform: none; opacity: 1; } }
@keyframes toastOut { from { transform: none; opacity: 1; } to { transform: translateX(120%); opacity: 0; } }
@keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }

.animate-fade { animation: fadeIn 0.2s ease; }
.animate-slide-up { animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1); }

/* ── INLINE SVG ICONS ── */
.ic { display: inline-flex; align-items: center; justify-content: center; flex-shrink: 0; }
.ic svg { width: 1em; height: 1em; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

/* ── LOGIN OVERLAY ── */
.login-overlay {
    position: fixed; inset: 0;
    background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 50%, #1d4ed8 100%);
    z-index: 9999; display: flex; align-items: center; justify-content: center;
    padding: 20px; animation: fadeIn 0.4s ease;
}
.login-overlay.hidden { display: none; }
.login-box {
    background: white; border-radius: var(--radius-xl); padding: 44px 40px;
    width: 100%; max-width: 400px;
    box-shadow: 0 25px 60px rgba(0,0,0,0.25);
    animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1);
}
.login-logo { text-align: center; margin-bottom: 32px; }
.login-logo img.logo-big { height: 64px; margin-bottom: 20px; }
.login-title { font-size: 24px; font-weight: 700; color: var(--text); letter-spacing: -0.025em; }
.login-subtitle { font-size: 14px; color: var(--text-muted); margin-top: 6px; }
.login-form { display: flex; flex-direction: column; gap: 16px; }
.login-error {
    background: var(--danger-light); border: 1px solid #fecaca; border-radius: var(--radius);
    padding: 12px 14px; font-size: 13px; color: #dc2626; display: none;
    animation: slideDown 0.2s ease;
}
.login-error.visible { display: block; }
.login-btn-loading { pointer-events: none; opacity: 0.7; }

/* ── USER BADGE ── */
.user-badge {
    display: flex; align-items: center; gap: 8px;
    padding: 6px 14px; background: var(--bg-alt);
    border-radius: 24px; font-size: 13px; font-weight: 500;
    border: 1px solid var(--border);
}
.user-role-pill {
    font-size: 10px; font-weight: 700; padding: 2px 8px;
    border-radius: 20px; text-transform: uppercase; letter-spacing: 0.06em;
}
.user-role-pill.admin { background: #fef3c7; color: #92400e; }
.user-role-pill.operatore { background: var(--primary-light); color: var(--primary); }

/* ── HEADER ── */
.header {
    background: var(--white);
    border-bottom: 1px solid var(--border);
    padding: 0 28px; height: 60px;
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
    box-shadow: var(--shadow-sm);
    backdrop-filter: blur(12px);
    background: rgba(255,255,255,0.95);
}
.header-left { display: flex; align-items: center; gap: 14px; }
.logo-img { height: 32px; }
.header h1 { font-size: 17px; font-weight: 700; letter-spacing: -0.02em; color: var(--text); }
.header-right { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }

/* ── BUTTONS ── */
.btn {
    padding: 8px 16px; border-radius: var(--radius); border: none;
    cursor: pointer; font-size: 13px; font-weight: 600; font-family: inherit;
    display: inline-flex; align-items: center; gap: 6px;
    transition: all var(--transition); line-height: 1.4;
    white-space: nowrap; position: relative; overflow: hidden;
}
.btn:active { transform: scale(0.97); }
.btn-primary { background: var(--primary); color: #fff; }
.btn-primary:hover { background: var(--primary-dark); box-shadow: 0 4px 12px rgba(37,99,235,0.3); }
.btn-outline { background: var(--white); border: 1px solid var(--border); color: var(--text-secondary); }
.btn-outline:hover { background: var(--bg); border-color: #cbd5e1; color: var(--text); }
.btn-danger { background: var(--danger); color: #fff; }
.btn-danger:hover { background: #dc2626; box-shadow: 0 4px 12px rgba(239,68,68,0.3); }
.btn-success { background: var(--success); color: #fff; }
.btn-success:hover { background: #059669; }
.btn-warning { background: var(--warning); color: #fff; }
.btn-warning:hover { background: #d97706; }
.btn-ghost { background: none; border: none; color: var(--text-secondary); padding: 8px; }
.btn-ghost:hover { background: var(--bg-alt); color: var(--text); }
.btn-sm { padding: 5px 10px; font-size: 12px; border-radius: 8px; }
.btn-icon { padding: 7px; width: 34px; height: 34px; justify-content: center; }

/* ── MAIN ── */
.main { padding: 20px 28px; max-width: 1440px; margin: 0 auto; }

.toolbar {
    display: flex; gap: 10px; margin-bottom: 18px; align-items: center; flex-wrap: wrap;
}
.search-wrapper { position: relative; flex: 1; min-width: 240px; }
.search-icon {
    position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
    color: var(--text-muted); pointer-events: none; display: flex;
}
.search-input {
    width: 100%; padding: 10px 14px 10px 40px;
    border: 1px solid var(--border); border-radius: var(--radius);
    font-size: 14px; font-family: inherit;
    background: var(--white); color: var(--text);
    outline: none; transition: all var(--transition);
}
.search-input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-ring); }
.search-input::placeholder { color: var(--text-muted); }

/* ── VIEW TOGGLE ── */
.view-toggle {
    display: flex; gap: 2px; background: var(--bg-alt);
    border: 1px solid var(--border); border-radius: var(--radius); padding: 3px;
}
.vt-btn {
    padding: 7px 14px; border-radius: 8px; border: none;
    background: none; cursor: pointer; font-size: 13px; font-weight: 500;
    color: var(--text-muted); transition: all var(--transition); white-space: nowrap;
    font-family: inherit;
}
.vt-btn.active {
    background: var(--white); color: var(--primary);
    box-shadow: var(--shadow-sm); font-weight: 600;
}

.stats {
    font-size: 13px; color: var(--text-muted); margin-bottom: 16px;
    display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
    font-weight: 500;
}
.active-letter-badge {
    display: inline-flex; align-items: center; gap: 6px;
    background: var(--primary); color: #fff;
    font-size: 12px; font-weight: 600; padding: 3px 10px 3px 10px;
    border-radius: 20px;
}
.active-letter-badge button {
    background: none; border: none; color: rgba(255,255,255,0.8); cursor: pointer;
    font-size: 13px; line-height: 1; padding: 0 0 0 2px;
    transition: color 0.15s;
}
.active-letter-badge button:hover { color: #fff; }

/* ── CONTENT AREA ── */
.content-area { display: flex; gap: 12px; align-items: flex-start; }
.clients-area { flex: 1; min-width: 0; }

/* ── ALPHA SIDEBAR ── */
.alpha-sidebar {
    width: 28px; position: sticky; top: 72px;
    display: flex; flex-direction: column; align-items: center;
    gap: 1px; user-select: none; flex-shrink: 0;
    padding: 6px 0; background: var(--white);
    border: 1px solid var(--border); border-radius: var(--radius-lg);
    box-shadow: var(--shadow-sm);
}
.alpha-btn {
    width: 22px; height: 18px;
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; font-weight: 700; letter-spacing: 0;
    border-radius: 5px; border: none; background: none;
    transition: all 0.15s; line-height: 1; cursor: default;
    color: #d1d5db;
}
.alpha-btn.has { color: var(--primary); cursor: pointer; }
.alpha-btn.has:hover { background: var(--primary-light); }
.alpha-btn.active { background: var(--primary) !important; color: #fff !important; }
.alpha-sep { width: 14px; height: 1px; background: var(--border); margin: 2px 0; }

/* ── LETTER SECTION ── */
.letter-section { margin-bottom: 8px; }
.letter-section-hd {
    font-size: 11px; font-weight: 800; color: var(--primary);
    padding: 3px 10px; margin-bottom: 8px;
    background: var(--primary-light);
    border-radius: 6px; display: inline-block;
    letter-spacing: 0.05em;
}

/* ── CARD GRID ── */
.client-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 14px;
}
.client-card {
    background: var(--white); border-radius: var(--radius-lg); padding: 20px;
    cursor: pointer; transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    border: 1px solid var(--border); box-shadow: var(--shadow-sm);
    position: relative; overflow: hidden;
}
.client-card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
    background: linear-gradient(90deg, var(--primary), #60a5fa);
    opacity: 0; transition: opacity 0.25s;
}
.client-card:hover {
    transform: translateY(-2px);
    box-shadow: var(--shadow-lg);
    border-color: #bfdbfe;
}
.client-card:hover::before { opacity: 1; }
.client-avatar {
    width: 44px; height: 44px; border-radius: 12px;
    background: var(--primary-light); color: var(--primary);
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; font-weight: 700; margin-bottom: 12px;
    letter-spacing: -0.02em;
}
.client-name { font-size: 15px; font-weight: 600; margin-bottom: 3px; line-height: 1.3; color: var(--text); }
.client-ref { font-size: 12px; color: var(--text-muted); margin-bottom: 10px; }
.client-info { font-size: 12px; color: var(--text-secondary); display: flex; flex-direction: column; gap: 4px; }
.client-info span { display: flex; align-items: center; gap: 6px; }
.client-info .info-icon { color: var(--text-muted); flex-shrink: 0; }
.account-badges { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 12px; }
.badge {
    font-size: 10px; padding: 2px 8px; border-radius: 20px;
    background: var(--bg-alt); color: var(--text-secondary); font-weight: 600;
    border: 1px solid var(--border); letter-spacing: 0.01em;
}

/* ── LIST VIEW ── */
.client-list { display: flex; flex-direction: column; gap: 3px; }
.client-row {
    background: var(--white); border-radius: var(--radius); padding: 10px 14px;
    cursor: pointer; transition: all var(--transition); border: 1px solid var(--border);
    display: flex; align-items: center; gap: 12px;
}
.client-row:hover { border-color: #bfdbfe; box-shadow: var(--shadow); background: #fafcff; }
.cr-avatar {
    width: 34px; height: 34px; border-radius: 9px; flex-shrink: 0;
    background: var(--primary-light); color: var(--primary);
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 700;
}
.cr-main { min-width: 150px; flex-shrink: 0; }
.cr-name { font-size: 14px; font-weight: 600; line-height: 1.3; }
.cr-ref { font-size: 11px; color: var(--text-muted); margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.cr-contact { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 2px; }
.cr-contact span { font-size: 12px; color: var(--text-secondary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: flex; align-items: center; gap: 4px; }
.cr-location { font-size: 12px; color: var(--text-secondary); min-width: 90px; flex-shrink: 0; white-space: nowrap; display: flex; align-items: center; gap: 4px; }
.cr-badges { display: flex; flex-wrap: wrap; gap: 3px; justify-content: flex-end; min-width: 60px; }

.empty-state { text-align: center; padding: 80px 24px; color: var(--text-muted); }
.empty-state .ei { font-size: 48px; margin-bottom: 16px; opacity: 0.4; }
.empty-state h3 { font-size: 18px; color: var(--text); margin-bottom: 8px; font-weight: 600; }
.empty-state p { font-size: 14px; line-height: 1.6; max-width: 400px; margin: 0 auto; }

/* ── MODAL ── */
.modal-overlay {
    position: fixed; inset: 0; background: rgba(15,23,42,0.5);
    z-index: 1000; display: flex; align-items: flex-start; justify-content: center;
    padding: 24px; overflow-y: auto; backdrop-filter: blur(4px);
    animation: fadeIn 0.15s ease;
}
.modal-overlay.hidden { display: none; }
.modal {
    background: var(--white); border-radius: var(--radius-xl);
    width: 100%; max-width: 740px; padding: 32px;
    position: relative; box-shadow: var(--shadow-xl); margin: auto;
    animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1);
}
.modal.modal-xl { max-width: 1020px; }
.modal-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 24px; }
.modal-title { font-size: 20px; font-weight: 700; letter-spacing: -0.02em; }
.modal-subtitle { font-size: 13px; color: var(--text-muted); margin-top: 4px; }
.close-btn {
    background: none; border: none; cursor: pointer;
    color: var(--text-muted); font-size: 18px; padding: 6px 8px;
    border-radius: 8px; line-height: 1; flex-shrink: 0;
    transition: all var(--transition);
}
.close-btn:hover { background: var(--bg-alt); color: var(--text); }

/* ── DETAIL VIEW ── */
.section-title {
    font-size: 11px; font-weight: 700; color: var(--text-muted);
    text-transform: uppercase; letter-spacing: 0.08em;
    margin-bottom: 12px; display: flex; align-items: center; gap: 8px;
}
.section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

.detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 22px; }
.detail-item { display: flex; flex-direction: column; gap: 3px; }
.detail-item.fw { grid-column: 1/-1; }
.dlabel { font-size: 10px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em; }
.dvalue {
    font-size: 13px; color: var(--text); padding: 8px 10px;
    background: var(--bg); border-radius: 8px; word-break: break-word; line-height: 1.4;
}
.dvalue.empty { color: var(--text-muted); font-style: italic; }
.dvalue a { color: var(--primary); text-decoration: none; font-weight: 500; }
.dvalue a:hover { text-decoration: underline; }

.notes-box {
    background: var(--bg); border-radius: var(--radius); padding: 14px;
    font-size: 13px; white-space: pre-wrap; line-height: 1.6; margin-bottom: 22px;
    color: var(--text-secondary);
}

/* Account card in detail */
.acc-card {
    background: var(--bg); border: 1px solid var(--border-light);
    border-radius: var(--radius); padding: 14px; margin-bottom: 10px;
    transition: border-color var(--transition);
}
.acc-card:hover { border-color: var(--border); }
.acc-type-label {
    font-size: 11px; font-weight: 700; color: var(--primary);
    text-transform: uppercase; letter-spacing: 0.06em;
    margin-bottom: 10px; display: flex; align-items: center; gap: 6px;
}
.acc-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.pwd-row { display: flex; align-items: center; gap: 4px; }
.pwd-val {
    flex: 1; font-size: 13px; padding: 8px 10px;
    background: var(--white); border-radius: 8px; font-family: 'SF Mono', 'Fira Code', monospace;
    word-break: break-all; border: 1px solid var(--border-light);
}
.icon-btn {
    background: none; border: none; cursor: pointer;
    color: var(--text-muted); font-size: 14px; padding: 4px 5px;
    border-radius: 6px; transition: all var(--transition); display: flex; align-items: center;
}
.icon-btn:hover { color: var(--primary); background: var(--primary-light); }
.acc-note { font-size: 12px; color: var(--text-muted); margin-top: 8px; padding-left: 2px; }

/* Modal actions */
.modal-actions {
    display: flex; gap: 8px; margin-top: 24px;
    padding-top: 20px; border-top: 1px solid var(--border); flex-wrap: wrap;
}
.ml-auto { margin-left: auto; }

/* ── FORM ── */
.form-section { margin-bottom: 24px; }
.form-section-title {
    font-size: 11px; font-weight: 700; color: var(--text-muted);
    text-transform: uppercase; letter-spacing: 0.08em;
    padding-bottom: 10px; border-bottom: 1px solid var(--border); margin-bottom: 16px;
}
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.form-group { display: flex; flex-direction: column; gap: 5px; }
.form-group.fw { grid-column: 1/-1; }
.form-group.half2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.flabel { font-size: 12px; font-weight: 600; color: var(--text-secondary); }
.finput, .ftextarea, .fselect {
    padding: 9px 12px; border: 1px solid var(--border);
    border-radius: 8px; font-size: 13px; color: var(--text);
    background: var(--white); outline: none; transition: all var(--transition);
    font-family: inherit; width: 100%;
}
.finput:focus, .ftextarea:focus, .fselect:focus {
    border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-ring);
}
.finput::placeholder, .ftextarea::placeholder { color: var(--text-muted); }
.ftextarea { resize: vertical; min-height: 80px; }

/* Account form items */
.acc-form-item {
    background: var(--bg); border: 1px solid var(--border-light);
    border-radius: var(--radius); padding: 14px; margin-bottom: 10px;
}
.acc-form-header { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
.acc-form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.pwd-input-wrap { position: relative; display: flex; align-items: center; }
.pwd-input-wrap .finput { padding-right: 36px; }
.pwd-eye {
    position: absolute; right: 8px; background: none; border: none;
    cursor: pointer; color: var(--text-muted); padding: 3px;
    border-radius: 4px; transition: color var(--transition);
    display: flex; align-items: center;
}
.pwd-eye:hover { color: var(--primary); }
.add-acc-btn {
    width: 100%; padding: 12px; border: 2px dashed var(--border);
    border-radius: var(--radius); background: none; color: var(--text-muted);
    cursor: pointer; font-size: 13px; font-weight: 600; font-family: inherit;
    transition: all var(--transition); margin-top: 8px;
}
.add-acc-btn:hover { border-color: var(--primary); color: var(--primary); background: var(--primary-light); }

/* ── DROPDOWN ── */
.dropdown { position: relative; }
.dropdown-menu {
    position: absolute; right: 0; top: calc(100% + 6px);
    background: var(--white); border: 1px solid var(--border);
    border-radius: var(--radius-lg); box-shadow: var(--shadow-lg); min-width: 210px;
    z-index: 200; overflow: hidden;
    animation: slideDown 0.15s ease;
}
.dropdown-menu.hidden { display: none; }
.dd-item {
    width: 100%; padding: 10px 16px; background: none; border: none;
    text-align: left; cursor: pointer; font-size: 13px; color: var(--text-secondary);
    display: flex; align-items: center; gap: 8px; font-family: inherit;
    transition: all var(--transition);
}
.dd-item:hover { background: var(--bg); color: var(--text); }
.dd-sep { height: 1px; background: var(--border); margin: 4px 0; }
.dd-label {
    padding: 8px 16px 4px; font-size: 10px; font-weight: 700;
    color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.08em;
}

/* ── CONFIRM ── */
.confirm-overlay {
    position: fixed; inset: 0; background: rgba(15,23,42,0.5);
    z-index: 2000; display: flex; align-items: center; justify-content: center;
    backdrop-filter: blur(4px); animation: fadeIn 0.15s ease;
}
.confirm-overlay.hidden { display: none; }
.confirm-box {
    background: var(--white); border-radius: var(--radius-xl); padding: 32px;
    max-width: 380px; width: 90%; box-shadow: var(--shadow-xl); text-align: center;
    animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1);
}
.confirm-icon {
    width: 56px; height: 56px; border-radius: 50%;
    background: var(--danger-light); color: var(--danger);
    display: flex; align-items: center; justify-content: center;
    font-size: 24px; margin: 0 auto 16px;
}
.confirm-title { font-size: 18px; font-weight: 700; margin-bottom: 8px; }
.confirm-msg { font-size: 13px; color: var(--text-secondary); margin-bottom: 24px; line-height: 1.6; }
.confirm-actions { display: flex; gap: 10px; justify-content: center; }

/* ── TOAST ── */
.toast-wrap { position: fixed; bottom: 24px; right: 24px; z-index: 3000; display: flex; flex-direction: column; gap: 8px; }
.toast {
    background: var(--text); color: #fff; padding: 12px 18px; border-radius: var(--radius);
    font-size: 13px; font-weight: 500; box-shadow: var(--shadow-lg);
    display: flex; align-items: center; gap: 8px;
    animation: toastIn 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    max-width: 360px;
}
.toast.ok { background: #065f46; }
.toast.err { background: #991b1b; }
.toast-exit { animation: toastOut 0.2s ease forwards; }

/* ── IMPORT TABLE MODAL ── */
.import-step { display: none; }
.import-step.active { display: block; }

.import-drop-zone {
    border: 2px dashed var(--border); border-radius: var(--radius-lg);
    padding: 56px 24px; text-align: center; cursor: pointer;
    transition: all 0.25s; background: var(--bg);
}
.import-drop-zone:hover, .import-drop-zone.drag-over {
    border-color: var(--primary); background: var(--primary-light);
}
.import-drop-zone .drop-icon { font-size: 44px; margin-bottom: 16px; opacity: 0.5; }
.import-drop-zone h3 { font-size: 16px; font-weight: 600; margin-bottom: 6px; }
.import-drop-zone p { font-size: 13px; color: var(--text-muted); margin-bottom: 18px; }

.import-info-box {
    background: var(--warning-light); border: 1px solid #fde68a; border-radius: var(--radius);
    padding: 14px 16px; margin-top: 18px; font-size: 12px; color: #92400e; line-height: 1.7;
}
.import-info-box strong { color: #78350f; }

.col-map-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 10px; margin-bottom: 18px;
}
.col-map-item { display: flex; flex-direction: column; gap: 4px; }
.col-map-label { font-size: 11px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.04em; }
.col-map-item select {
    padding: 8px 10px; border: 1px solid var(--border); border-radius: 8px;
    font-size: 12px; background: var(--white); color: var(--text); outline: none;
    font-family: inherit; transition: all var(--transition);
}
.col-map-item select:focus { border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-ring); }
.col-map-item select.mapped { border-color: var(--success); background: var(--success-light); }

.preview-wrap { overflow-x: auto; border-radius: var(--radius); border: 1px solid var(--border); max-height: 340px; overflow-y: auto; }
.preview-table { width: 100%; border-collapse: collapse; font-size: 12px; }
.preview-table th {
    background: var(--bg); padding: 10px 12px; text-align: left;
    font-weight: 700; color: var(--text-muted); font-size: 11px;
    text-transform: uppercase; letter-spacing: 0.04em;
    position: sticky; top: 0; border-bottom: 1px solid var(--border);
    white-space: nowrap;
}
.preview-table td {
    padding: 8px 12px; border-bottom: 1px solid var(--border-light);
    color: var(--text); max-width: 180px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.preview-table tr:last-child td { border-bottom: none; }
.preview-table tr:hover td { background: var(--bg); }

.import-summary {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px;
}
.sum-card { background: var(--bg); border-radius: var(--radius); padding: 16px; text-align: center; border: 1px solid var(--border-light); }
.sum-num { font-size: 28px; font-weight: 800; color: var(--primary); letter-spacing: -0.03em; }
.sum-lbl { font-size: 12px; color: var(--text-muted); margin-top: 4px; font-weight: 500; }

.step-header { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
.step-pill {
    background: var(--primary-light); color: var(--primary);
    font-size: 11px; font-weight: 700; padding: 4px 12px; border-radius: 20px;
    white-space: nowrap; letter-spacing: 0.02em;
}
.step-title { font-size: 16px; font-weight: 700; }
.step-sub { font-size: 12px; color: var(--text-muted); margin-top: 2px; }

.merge-options { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
.merge-opt {
    flex: 1; min-width: 180px; border: 2px solid var(--border); border-radius: var(--radius);
    padding: 16px; cursor: pointer; transition: all var(--transition); background: var(--white);
}
.merge-opt:hover { border-color: #93c5fd; }
.merge-opt.selected { border-color: var(--primary); background: var(--primary-light); }
.merge-opt-icon { font-size: 20px; margin-bottom: 8px; }
.merge-opt-title { font-size: 13px; font-weight: 700; margin-bottom: 4px; }
.merge-opt-desc { font-size: 11px; color: var(--text-muted); line-height: 1.5; }

/* ── PIN BUTTON ── */
.pin-btn {
    position: absolute; top: 10px; right: 10px;
    background: var(--white); border: 1px solid var(--border); cursor: pointer;
    width: 28px; height: 28px; border-radius: 7px;
    display: flex; align-items: center; justify-content: center;
    opacity: 0; transition: all 0.2s; z-index: 5;
    color: var(--text-muted);
}
.client-card:hover .pin-btn, .client-row:hover .pin-btn-row { opacity: 0.7; }
.pin-btn:hover, .pin-btn-row:hover { opacity: 1 !important; color: var(--primary); border-color: var(--primary); background: var(--primary-light); }
.pin-btn.pinned, .pin-btn-row.pinned { opacity: 1; color: var(--warning); border-color: var(--warning); background: var(--warning-light); }
.pin-btn-row {
    background: var(--white); border: 1px solid var(--border); cursor: pointer;
    width: 28px; height: 28px; border-radius: 7px;
    display: flex; align-items: center; justify-content: center;
    opacity: 0; transition: all 0.2s; flex-shrink: 0;
    color: var(--text-muted);
}
.pin-btn-row.pinned { opacity: 1; color: var(--warning); border-color: var(--warning); background: var(--warning-light); }
.pinned-section {
    margin-bottom: 18px; padding: 16px 16px 10px;
    background: linear-gradient(135deg, #fffbeb, #fef3c7);
    border: 1px solid #fde68a; border-radius: var(--radius-lg);
}
.pinned-section-hd {
    font-size: 11px; font-weight: 800; color: #92400e;
    padding: 4px 12px; margin-bottom: 12px;
    display: inline-flex; align-items: center; gap: 6px;
    background: rgba(253,230,138,0.6); border-radius: 6px; letter-spacing: 0.06em;
}

/* ── FORCE PASSWORD CHANGE ── */
.force-pwd-overlay {
    position: fixed; inset: 0;
    background: rgba(15,23,42,0.6);
    z-index: 5000; display: flex; align-items: center; justify-content: center;
    padding: 20px; backdrop-filter: blur(8px);
    animation: fadeIn 0.3s ease;
}
.force-pwd-overlay.hidden { display: none; }
.force-pwd-box {
    background: white; border-radius: var(--radius-xl); padding: 40px;
    max-width: 420px; width: 100%;
    box-shadow: var(--shadow-xl); text-align: center;
    animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1);
}

/* ── SETTINGS USER LIST ── */
.settings-user-card {
    border: 1px solid var(--border); border-radius: var(--radius); padding: 14px;
    display: flex; align-items: center; gap: 14px;
    transition: all var(--transition);
}
.settings-user-card.active { background: var(--success-light); border-color: #a7f3d0; }
.settings-user-card.disabled { background: var(--danger-light); border-color: #fecaca; }

/* ── RESPONSIVE ── */
@media (max-width: 700px) {
    .cr-contact, .cr-location { display: none; }
    .cr-main { min-width: 0; flex: 1; }
    .alpha-sidebar { display: none; }
    .user-badge { display: none; }
    .header { padding: 0 16px; }
    .main { padding: 16px; }
}
@media (max-width: 580px) {

    .header { padding: 0 12px; }
    .import-summary { grid-template-columns: 1fr 1fr; }
    .client-grid { grid-template-columns: 1fr; }
}

/* ═══════════════════════════════════════════════
   AUTH STATE
   ═══════════════════════════════════════════════ */
auth.onAuthStateChanged(async (firebaseUser) => {
    if (firebaseUser) {
        try {
            const userDoc = await db.collection(COL_USERS).doc(firebaseUser.uid).get();
            if (userDoc.exists) {
                const data = userDoc.data();
                if (!data.attivo) {
                    await auth.signOut();
                    showLoginOverlay();
                    setLoginError('Account disabilitato. Contatta l\'amministratore.');
                    return;
                }
                currentAppUser = { uid: firebaseUser.uid, ...data };

                // Handle pending password from admin reset
                if (data.pendingPassword) {
                    try {
                        await firebaseUser.updatePassword(data.pendingPassword);
                        await db.collection(COL_USERS).doc(firebaseUser.uid).update({
                            pendingPassword: firebase.firestore.FieldValue.delete()
                        });
                    } catch(e) { console.warn('pendingPassword error:', e); }
                }

                // Force password change on first login
                if (data.mustChangePassword) {
                    document.getElementById('loginOverlay').classList.add('hidden');
                    document.getElementById('forcePwdOverlay').classList.remove('hidden');
                    return;
                }
                pinnedClientIds = new Set(data.pinnedClients || []);
            } else {
                // First user ever -> auto-create as admin
                const allUsersSnap = await db.collection(COL_USERS).limit(1).get();
                if (allUsersSnap.empty) {
                    const username = firebaseUser.email.split('@')[0];
                    const userData = { username, nome: username, ruolo: 'admin', attivo: true, createdAt: Date.now() };
                    await db.collection(COL_USERS).doc(firebaseUser.uid).set(userData);
                    currentAppUser = { uid: firebaseUser.uid, ...userData };
                } else {
                    await auth.signOut();
                    showLoginOverlay();
                    setLoginError('Account non autorizzato. Contatta l\'amministratore.');
                    return;
                }
            }
            hideLoginOverlay();
            updateHeaderUser();
            isLoading = true;
            renderGrid();
            await load();
            isLoading = false;
            renderGrid();
        } catch(e) {
            console.error('Auth check error:', e);
            setLoginError('Errore di connessione: ' + e.message);
        }
    } else {
        currentAppUser = null;
        clients = [];
        pinnedClientIds = new Set();
        document.getElementById('forcePwdOverlay').classList.add('hidden');
        showLoginOverlay();
    }
});

/* ── Login / Logout ── */
function showLoginOverlay() {
    document.getElementById('loginOverlay').classList.remove('hidden');
    document.getElementById('appUI').style.display = 'none';
}
function hideLoginOverlay() {
    document.getElementById('loginOverlay').classList.add('hidden');
    document.getElementById('appUI').style.display = '';
}
function setLoginError(msg) {
    const el = document.getElementById('loginError');
    el.textContent = msg;
    el.classList.add('visible');
}
function clearLoginError() {
    document.getElementById('loginError').classList.remove('visible');
}
function toggleLoginPwd() {
    const el = document.getElementById('loginPwd');
    el.type = el.type === 'password' ? 'text' : 'password';
}

async function doLogin() {
    const username = (document.getElementById('loginUser').value || '').trim().toLowerCase().replace(/\s+/g, '');
    const pwd = document.getElementById('loginPwd').value;
    if (!username || !pwd) { setLoginError('Inserisci username e password'); return; }
    clearLoginError();
    const email = username + '@access.local';
    const btn = document.getElementById('loginBtn');
    btn.classList.add('login-btn-loading');
    btn.innerHTML = 'Accesso in corso\u2026';
    try {
        await auth.signInWithEmailAndPassword(email, pwd);
    } catch(e) {
        let msg = 'Credenziali non valide';
        if (e.code === 'auth/user-not-found' || e.code === 'auth/wrong-password' || e.code === 'auth/invalid-credential')
            msg = 'Username o password errati';
        else if (e.code === 'auth/invalid-email')
            msg = 'Username non valido (usa solo lettere, numeri, punti)';
        else if (e.code === 'auth/too-many-requests')
            msg = 'Troppi tentativi. Riprova tra qualche minuto.';
        setLoginError(msg);
    } finally {
        btn.classList.remove('login-btn-loading');
        btn.innerHTML = 'Accedi';
    }
}

async function doLogout() { await auth.signOut(); }

/* ── Header ── */
function updateHeaderUser() {
    if (!currentAppUser) return;
    const badge = document.getElementById('userBadge');
    const name = currentAppUser.nome || currentAppUser.username;
    const roleLabel = currentAppUser.ruolo === 'admin' ? 'Admin' : 'Operatore';
    const roleClass = currentAppUser.ruolo === 'admin' ? 'admin' : 'operatore';
    badge.innerHTML = '<span class="user-role-pill ' + roleClass + '">' + roleLabel + '</span> ' + esc(name);
    document.getElementById('settingsBtn').style.display = currentAppUser.ruolo === 'admin' ? '' : 'none';
    document.getElementById('ddData').style.display = currentAppUser.ruolo === 'admin' ? '' : 'none';
}

function isAdmin() { return currentAppUser && currentAppUser.ruolo === 'admin'; }

/* ── Tab Switch ── */
function switchTab(tab) {
    document.getElementById('tabClients').style.display = tab === 'clients' ? '' : 'none';
    document.getElementById('tabSettings').style.display = tab === 'settings' ? '' : 'none';
    if (tab === 'settings') renderSettings();
}

async function createUser() {
    const nome     = (document.getElementById('nu_nome').value || '').trim();
    const username = (document.getElementById('nu_username').value || '').trim().toLowerCase().replace(/\s+/g, '');
    const pwd      = document.getElementById('nu_pwd').value;
    const ruolo    = document.getElementById('nu_ruolo').value;

    if (!nome || !username || !pwd) { toast('Compila tutti i campi obbligatori', 'err'); return; }
    if (!/^[a-z0-9._-]+$/.test(username)) { toast('Username: solo lettere minuscole, numeri, punti, trattini', 'err'); return; }
    if (pwd.length < 6) { toast('La password deve essere di almeno 6 caratteri', 'err'); return; }

    const email = username + '@access.local';
    const btn = document.getElementById('createUserBtn');
    if (btn) { btn.disabled = true; btn.innerHTML = 'Creazione\u2026'; }

    try {
        const cred = await secondaryAuth.createUserWithEmailAndPassword(email, pwd);
        const newUid = cred.user.uid;
        await secondaryAuth.signOut();

        await db.collection(COL_USERS).doc(newUid).set({
            username, nome, ruolo, attivo: true, mustChangePassword: true, pinnedClients: [], createdAt: Date.now()
        });

        toast('Operatore "' + nome + '" (@' + username + ') creato', 'ok');
        await renderSettings();
    } catch(e) {
        let msg = e.message;
        if (e.code === 'auth/email-already-in-use') msg = 'Username già in uso. Prova con uno diverso (es. nome.cognome2)';
        else if (e.code === 'auth/weak-password') msg = 'Password troppo debole (min. 6 caratteri)';
        else if (e.code === 'auth/invalid-email') msg = 'Username non valido';
        toast('Errore: ' + msg, 'err');
    } finally {
        if (btn) { btn.disabled = false; btn.innerHTML = ic('plus',14) + ' Crea Utente'; }
    }
}

async function toggleUserActive(uid, newState) {
    try {
        await db.collection(COL_USERS).doc(uid).update({ attivo: newState });
        toast(newState ? 'Utente riabilitato' : 'Utente disabilitato', 'ok');
        await renderSettings();
    } catch(e) { toast('Errore: ' + e.message, 'err'); }
}

async function deleteSettingsUser(uid, nome) {
    showConfirm('Eliminare "' + nome + '" dal sistema? L\'utente non potrà più accedere.', async () => {
        try {
            await db.collection(COL_USERS).doc(uid).delete();
            toast('Utente "' + nome + '" eliminato', 'ok');
            await renderSettings();
        } catch(e) { toast('Errore: ' + e.message, 'err'); }
    });
}

async function resetUserPwd(uid, nome) {
    const newPwd = prompt('Nuova password per "' + nome + '" (min. 6 caratteri):');
    if (!newPwd) return;
    if (newPwd.length < 6) { toast('Min. 6 caratteri', 'err'); return; }
    try {
        await db.collection(COL_USERS).doc(uid).update({ pendingPassword: newPwd });
        toast('Password impostata per "' + nome + '"', 'ok');
    } catch(e) { toast('Errore: ' + e.message, 'err'); }
}

/* ── Password change (self-service) ── */
function openChangePwd() {
    document.getElementById('changePwdModal').classList.remove('hidden');
}

async function doChangePwd() {
    const oldPwd = document.getElementById('chgOldPwd').value;
    const newPwd = document.getElementById('chgNewPwd').value;
    const newPwd2 = document.getElementById('chgNewPwd2').value;
    if (!oldPwd || !newPwd) { toast('Compila tutti i campi', 'err'); return; }
    if (newPwd.length < 6) { toast('Min. 6 caratteri', 'err'); return; }
    if (newPwd !== newPwd2) { toast('Le password non coincidono', 'err'); return; }
    try {
        const credential = firebase.auth.EmailAuthProvider.credential(auth.currentUser.email, oldPwd);
        await auth.currentUser.reauthenticateWithCredential(credential);
        await auth.currentUser.updatePassword(newPwd);
        toast('Password aggiornata', 'ok');
        closeModal('changePwdModal');
        document.getElementById('chgOldPwd').value = '';
        document.getElementById('chgNewPwd').value = '';
        document.getElementById('chgNewPwd2').value = '';
    } catch(e) {
        toast('Password attuale non corretta', 'err');
    }
}

/* ── Force Password Change (first login) ── */
async function doForceChangePwd() {
    const pwd1 = document.getElementById('forceNewPwd').value;
    const pwd2 = document.getElementById('forceNewPwd2').value;
    if (!pwd1 || pwd1.length < 6) { toast('Min. 6 caratteri', 'err'); return; }
    if (pwd1 !== pwd2) { toast('Le password non coincidono', 'err'); return; }
    try {
        await auth.currentUser.updatePassword(pwd1);
        await db.collection(COL_USERS).doc(currentAppUser.uid).update({ mustChangePassword: false });
        currentAppUser.mustChangePassword = false;
        document.getElementById('forcePwdOverlay').classList.add('hidden');
        pinnedClientIds = new Set(currentAppUser.pinnedClients || []);
        document.getElementById('appUI').style.display = '';
        updateHeaderUser();
        isLoading = true;
        renderGrid();
        await load();
        isLoading = false;
        renderGrid();
        toast('Password impostata. Benvenuto!', 'ok');
    } catch(e) {
        if (e.code === 'auth/requires-recent-login') {
            toast('Sessione scaduta. Effettua nuovamente il login.', 'err');
            await auth.signOut();
        } else { toast('Errore: ' + e.message, 'err'); }
    }
}

/* ── Pin / Unpin ── */
async function togglePin(clientId, event) {
    if (event) event.stopPropagation();
    if (pinnedClientIds.has(clientId)) {
        pinnedClientIds.delete(clientId);
        toast('Rimosso dai fissati', 'ok');
    } else {
        pinnedClientIds.add(clientId);
        toast('Fissato in alto', 'ok');
    }
    try {
        await db.collection(COL_USERS).doc(currentAppUser.uid).update({
            pinnedClients: Array.from(pinnedClientIds)
        });
    } catch(e) { console.warn('Pin save error:', e); }
    renderGrid();
    const pinBtn = document.getElementById('detailPinBtn');
    if (pinBtn && currentId) {
        const isPinned = pinnedClientIds.has(currentId);
        pinBtn.innerHTML = ic('pin',14) + ' ' + (isPinned ? 'Rimuovi' : 'Fissa in alto');
        pinBtn.className = 'btn ' + (isPinned ? 'btn-warning' : 'btn-outline');
    }
}

function genId() { return 'c_' + Date.now() + '_' + Math.random().toString(36).slice(2,9); }

/* ── Utils ── */
function esc(s) {
    return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function initials(name) {
    if (!name) return '?';
    const p = name.trim().split(/\s+/);
    return p.length > 1 ? (p[0][0]+p[1][0]).toUpperCase() : name.slice(0,2).toUpperCase();
}
function stripPrefix(name) {
    if (!name) return '';
    const n = name.trim();
    const nl = n.toLowerCase();
    for (const p of PREFIXES) {
        if (nl.startsWith(p + ' ')) return n.slice(p.length).trim();
        if (nl === p) return n;
    }
    return n;
}
function getSortKey(name) {
    const stripped = stripPrefix(name || '');
    if (!stripped) return '#';
    const ch = stripped[0].toUpperCase();
    return /[A-Z]/.test(ch) ? ch : '#';
}

/* ── View ── */
function setView(mode) {
    viewMode = mode;
    document.getElementById('vtGrid').classList.toggle('active', mode === 'grid');
    document.getElementById('vtList').classList.toggle('active', mode === 'list');
    renderGrid();
}

function onSearch() { renderGrid(); }

function setLetter(letter) { activeLetter = (activeLetter === letter) ? null : letter; renderGrid(); }
function clearLetter() { activeLetter = null; renderGrid(); }

function buildAlphabetSidebar(presentLetters) {
    const has = new Set(presentLetters);
    const sidebar = document.getElementById('alphaSidebar');
    if (!sidebar) return;
    let html = '';
    ALPHA_LETTERS.forEach(l => {
        const hasIt = has.has(l);
        const isActive = activeLetter === l;
        html += '<button class="alpha-btn' + (hasIt?' has':'') + (isActive?' active':'') + '"' +
            (hasIt ? ' onclick="setLetter(\'' + l + '\')"' : '') +
            ' title="' + l + '">' + l + '</button>';
    });
    if (has.has('#')) {
        html += '<div class="alpha-sep"></div><button class="alpha-btn has' + (activeLetter==='#'?' active':'') + '" onclick="setLetter(\'#\')" title="#">#</button>';
    }
    sidebar.innerHTML = html;
}

/* ── Render Grid ── */
function renderGrid() {
    const searchEl = document.getElementById('searchInput');
    if (!searchEl) return;
    const q = (searchEl.value || '').toLowerCase().trim();

    let filtered = q
        ? clients.filter(c =>
            [c.cliente,c.referente,c.email,c.telefono,c.citta,c.indirizzo,c.note]
            .some(f => (f||'').toLowerCase().includes(q)) ||
            (c.accounts||[]).some(a =>
                (a.username||'').toLowerCase().includes(q) ||
                (a.type||'').toLowerCase().includes(q)
            )
          )
        : clients.slice();

    filtered.sort((a, b) => {
        const ka = stripPrefix(a.cliente || '').toLowerCase();
        const kb = stripPrefix(b.cliente || '').toLowerCase();
        return ka.localeCompare(kb, 'it');
    });

    const groups = {};
    const letterOrder = [];
    filtered.forEach(c => {
        const letter = getSortKey(c.cliente);
        if (!groups[letter]) { groups[letter] = []; letterOrder.push(letter); }
        groups[letter].push(c);
    });

    buildAlphabetSidebar(letterOrder);

    let displayGroups = groups;
    let displayOrder = letterOrder;
    if (activeLetter) {
        displayGroups = groups[activeLetter] ? { [activeLetter]: groups[activeLetter] } : {};
        displayOrder = activeLetter in displayGroups ? [activeLetter] : [];
    }

    const totalFiltered = displayOrder.reduce((s, l) => s + displayGroups[l].length, 0);

    let statsHtml = '';
    if (clients.length > 0) {
        const label = totalFiltered === clients.length
            ? clients.length + ' client' + (clients.length===1?'e':'i')
            : totalFiltered + ' di ' + clients.length + ' clienti';
        statsHtml = label;
    }
    if (activeLetter) {
        statsHtml += ' &nbsp;<span class="active-letter-badge">Lettera ' + activeLetter + ' <button onclick="clearLetter()" title="Rimuovi filtro">\u2715</button></span>';
    }
    const statsEl = document.getElementById('alphaStats');
    if (statsEl) statsEl.innerHTML = statsHtml;

    const area = document.getElementById('clientsArea');
    if (!area) return;

    if (isLoading) {
        area.innerHTML = '<div class="empty-state"><div class="ei" style="font-size:36px;opacity:0.3;">' + ic('search',36) + '</div><h3>Caricamento\u2026</h3><p>Connessione a Firebase in corso</p></div>';
        return;
    }
    if (clients.length === 0) {
        area.innerHTML = '<div class="empty-state"><div class="ei" style="font-size:36px;opacity:0.3;">' + ic('userPlus',36) + '</div><h3>Nessun cliente</h3><p>Clicca su <strong>Nuovo</strong> per iniziare oppure importa un file CSV/Excel.</p></div>';
        return;
    }
    if (displayOrder.length === 0) {
        area.innerHTML = '<div class="empty-state"><div class="ei" style="font-size:36px;opacity:0.3;">' + ic('search',36) + '</div><h3>Nessun risultato</h3><p>Prova un termine diverso o rimuovi il filtro</p></div>';
        return;
    }

    const pinnedInView = [];
    displayOrder.forEach(letter => {
        displayGroups[letter].forEach(c => {
            if (pinnedClientIds.has(c.id)) pinnedInView.push(c);
        });
    });

    let pinnedHtml = '';
    if (pinnedInView.length > 0) {
        const inner = viewMode === 'grid'
            ? '<div class="client-grid">' + pinnedInView.map(c => renderCard(c)).join('') + '</div>'
            : '<div class="client-list">' + pinnedInView.map(c => renderRow(c)).join('') + '</div>';
        pinnedHtml = '<div class="pinned-section">' +
            '<div class="pinned-section-hd">' + ic('pin',12) + ' FISSATI IN ALTO</div>' + inner + '</div>';
    }

    if (viewMode === 'grid') {
        area.innerHTML = pinnedHtml + displayOrder.map(letter => {
            const cards = displayGroups[letter].map(c => renderCard(c)).join('');
            return '<div class="letter-section" id="sec-' + letter + '">' +
                '<div class="letter-section-hd">' + letter + '</div>' +
                '<div class="client-grid">' + cards + '</div></div>';
        }).join('');
    } else {
        area.innerHTML = pinnedHtml + displayOrder.map(letter => {
            const rows = displayGroups[letter].map(c => renderRow(c)).join('');
            return '<div class="letter-section" id="sec-' + letter + '">' +
                '<div class="letter-section-hd">' + letter + '</div>' +
                '<div class="client-list">' + rows + '</div></div>';
        }).join('');
    }
}

function renderCard(c) {
    const types = [...new Set((c.accounts||[]).map(a=>a.type))];
    const badges = types.slice(0,5).map(t=>'<span class="badge">' + esc(t) + '</span>').join('');
    const more = types.length>5 ? '<span class="badge">+' + (types.length-5) + '</span>' : '';
    const isPinned = pinnedClientIds.has(c.id);
    return '<div class="client-card animate-slide-up" onclick="openDetail(\'' + c.id + '\')">' +
        '<button class="pin-btn' + (isPinned ? ' pinned' : '') + '" onclick="togglePin(\'' + c.id + '\', event)" title="' + (isPinned ? 'Rimuovi' : 'Fissa in alto') + '">' + ic('pin',13) + '</button>' +
        '<div class="client-avatar">' + esc(initials(c.cliente)) + '</div>' +
        '<div class="client-name">' + esc(c.cliente||'\u2014') + '</div>' +
        '<div class="client-ref">' + esc(c.referente||'') + '</div>' +
        '<div class="client-info">' +
            (c.email ? '<span>' + ic('mail',12) + ' ' + esc(c.email) + '</span>' : '') +
            (c.telefono ? '<span>' + ic('phone',12) + ' ' + esc(c.telefono) + '</span>' : '') +
            (c.citta ? '<span>' + ic('mapPin',12) + ' ' + esc(c.citta) + (c.provincia?' ('+esc(c.provincia)+')':'') + '</span>' : '') +
        '</div>' +
        (types.length ? '<div class="account-badges">' + badges + more + '</div>' : '') +
    '</div>';
}

function renderRow(c) {
    const types = [...new Set((c.accounts||[]).map(a=>a.type))];
    const badges = types.slice(0,4).map(t=>'<span class="badge" style="font-size:9px">' + esc(t) + '</span>').join('');
    const more = types.length>4 ? '<span class="badge" style="font-size:9px">+' + (types.length-4) + '</span>' : '';
    const isPinned = pinnedClientIds.has(c.id);
    return '<div class="client-row" onclick="openDetail(\'' + c.id + '\')">' +
        '<button class="pin-btn-row' + (isPinned ? ' pinned' : '') + '" onclick="togglePin(\'' + c.id + '\', event)" title="' + (isPinned ? 'Rimuovi' : 'Fissa in alto') + '">' + ic('pin',12) + '</button>' +
        '<div class="cr-avatar">' + esc(initials(c.cliente)) + '</div>' +
        '<div class="cr-main"><div class="cr-name">' + esc(c.cliente||'\u2014') + '</div><div class="cr-ref">' + esc(c.referente||'') + '</div></div>' +
        '<div class="cr-contact">' +
            (c.email ? '<span>' + ic('mail',11) + ' ' + esc(c.email) + '</span>' : '') +
            (c.telefono ? '<span>' + ic('phone',11) + ' ' + esc(c.telefono) + '</span>' : '') +
        '</div>' +
        '<div class="cr-location">' + (c.citta ? ic('mapPin',11) + ' ' + esc(c.citta) + (c.provincia?' ('+esc(c.provincia)+')':'') : '') + '</div>' +
        '<div class="cr-badges">' + badges + more + '</div>' +
    '</div>';
}

        '<div><div class="modal-title">' + esc(c.cliente || '\u2014') + '</div>' +

        '<button class="close-btn" onclick="closeModal(\'detailModal\')">' + ic('x') + '</button></div>';

    html += '<div class="section-title">Anagrafica</div>' +
        '<div class="detail-grid">' +
            dItem('Cliente', c.cliente) +
            dItem('Referente', c.referente) +
            dItem('Email', c.email, true) +
            dItem('Telefono', c.telefono) +
            dItem('Indirizzo', c.indirizzo, false, true) +
            dItem('Città', c.citta) +

        Object.entries(byType).forEach(([type, list]) => {
            list.forEach((acc, i) => {
                const key = type.replace(/\s/g,'_') + '_' + i;
                html += '<div class="acc-card">' +
                    '<div class="acc-type-label">' + ic('lock',13) + ' ' + esc(type) + (list.length>1?' #'+(i+1):'') + '</div>' +
                    '<div class="acc-row"><div>' +
                        '<div class="dlabel">Username / Email</div>' +
                        '<div class="pwd-row">' +
                            '<span class="pwd-val">' + (acc.username ? esc(acc.username) : '<em style="color:var(--text-muted);font-style:italic;font-size:12px">\u2014</em>') + '</span>' +
                            (acc.username ? '<button class="icon-btn" onclick="cp(\'' + esc(acc.username).replace(/'/g,"\\'") + '\')" title="Copia">' + ic('copy',14) + '</button>' : '') +
                        '</div></div><div>' +
                        '<div class="dlabel">Password</div>' +
                        '<div class="pwd-row">' +
                            '<span class="pwd-val" id="pv_' + esc(key) + '" data-pwd="' + esc(acc.password||'') + '" data-vis="0">' +
                                (acc.password ? '\u2022\u2022\u2022\u2022\u2022\u2022\u2022\u2022' : '<em style="color:var(--text-muted);font-style:italic;font-size:12px">\u2014</em>') +
                            '</span>' +
                            (acc.password ? '<button class="icon-btn" onclick="togglePwd(\'pv_' + esc(key) + '\')" title="Mostra/Nascondi">' + ic('eye',14) + '</button>' +
                                '<button class="icon-btn" onclick="cp(\'' + esc(acc.password).replace(/'/g,"\\'") + '\')" title="Copia">' + ic('copy',14) + '</button>' : '') +
                        '</div></div></div>' +
                    (acc.note ? '<div class="acc-note">' + esc(acc.note) + '</div>' : '') +

        });

    html += '<div class="modal-actions">' +

    '</div>';

    document.getElementById('detailContent').innerHTML = html;

function dItem(label, val, isEmail, fullWidth) {
    const empty = !val;
    let display = empty ? '\u2014' : esc(val);
    if (!empty && isEmail) display = '<a href="mailto:' + esc(val) + '">' + esc(val) + '</a>';
    return '<div class="detail-item' + (fullWidth?' fw':'') + '">' +
        '<div class="dlabel">' + label + '</div>' +
        '<div class="dvalue' + (empty?' empty':'') + '">' + display + '</div></div>';
}

function togglePwd(id) {
    const el = document.getElementById(id);
    if (!el) return;
    const vis = el.dataset.vis === '1';
    el.textContent = vis ? '\u2022\u2022\u2022\u2022\u2022\u2022\u2022\u2022' : el.dataset.pwd;
    el.dataset.vis = vis ? '0' : '1';
}

function cp(text) {
    const fallback = () => {
        const t = document.createElement('textarea');
        t.value = text; document.body.appendChild(t); t.select();
        document.execCommand('copy'); document.body.removeChild(t);
    };
    if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(text).then(() => toast('Copiato','ok')).catch(fallback);
    } else { fallback(); toast('Copiato','ok'); }
}

function editFromDetail() { closeModal('detailModal'); openEdit(currentId); }

function askDelete() {
    if (!isAdmin()) { toast('Solo l\'admin può eliminare', 'err'); return; }
    deleteId = currentId;
    const c = clients.find(x=>x.id===deleteId);
    showConfirm('Eliminare "' + (c?.cliente||'questo cliente') + '" e tutti i suoi dati? L\'operazione non può essere annullata.', doDelete);
}

async function doDelete() {
    if (!deleteId || !isAdmin()) return;
    const idToDelete = deleteId;
    closeConfirm();
    try {
        await db.collection(COL).doc(idToDelete).delete();
        clients = clients.filter(c=>c.id!==idToDelete);
        closeModal('detailModal');
        renderGrid();
        toast('Cliente eliminato','ok');
    } catch(e) { toast('Errore eliminazione: ' + e.message, 'err'); }
    deleteId = null;
}

function addAcc() {
    editAccounts.push({ type:'MEGA', username:'', password:'', note:'' });
    renderAccForm();
    setTimeout(()=>{ const el=document.getElementById('afi_'+(editAccounts.length-1)); if(el) el.scrollIntoView({behavior:'smooth',block:'center'}); },50);
}
function rmAcc(i) { editAccounts.splice(i,1); renderAccForm(); }
function updAcc(i,f,v) { if(editAccounts[i]) editAccounts[i][f]=v; }
function toggleFormPwd(i) { const el=document.getElementById('fp_'+i); if(el) el.type=el.type==='password'?'text':'password'; }

async function saveClient() {
    const cliente = (document.getElementById('f_cliente').value||'').trim();
    if (!cliente) { toast('Inserisci il nome del cliente','err'); document.getElementById('f_cliente').focus(); return; }

    const data = {
        cliente,
        referente  : (document.getElementById('f_referente').value||'').trim(),
        email      : (document.getElementById('f_email').value||'').trim(),
        telefono   : (document.getElementById('f_telefono').value||'').trim(),
        indirizzo  : (document.getElementById('f_indirizzo').value||'').trim(),
        citta      : (document.getElementById('f_citta').value||'').trim(),
        provincia  : (document.getElementById('f_provincia').value||'').trim(),
        cap        : (document.getElementById('f_cap').value||'').trim(),
        note       : (document.getElementById('f_note').value||'').trim(),
        accounts   : editAccounts.filter(a=>a.username||a.password)
    };

    try {
        if (editingId) {
            await db.collection(COL).doc(editingId).set(data);
            const idx = clients.findIndex(c=>c.id===editingId);
            if (idx !== -1) clients[idx] = { id: editingId, ...data };
        } else {
            const docId = genId();
            data.id = docId;
            data.createdAt = Date.now();
            await db.collection(COL).doc(docId).set(data);
            clients.push(data);
        }
        closeModal('editModal'); renderGrid();
        toast(editingId ? 'Cliente aggiornato' : 'Cliente aggiunto', 'ok');
    } catch(e) {
        toast('Errore salvataggio: ' + e.message, 'err');
    }
}
