function openTableImport(type) {
    importStep = 1;
    importRawData = []; importHeaders = []; importMapping = {}; importMergeMode = 'add';

    let html = '<div class="modal-header">' +
        '<div><div class="modal-title">Importa Clienti</div><div class="modal-subtitle">Carica un file per importare i dati</div></div>' +
        '<button class="close-btn" onclick="closeModal(\'importModal\')">' + ic('x') + '</button></div>';

    // Step 1
    html += '<div class="import-step active" id="importStep1">' +
        '<div class="import-drop-zone" id="dropZone" ondragover="dzOver(event)" ondragleave="dzLeave()" ondrop="dzDrop(event)" onclick="document.getElementById(\'fileInput\').click()">' +
            '<div class="drop-icon">' + ic('upload',44) + '</div>' +
            '<h3>Trascina il file qui</h3>' +
            '<p>oppure clicca per selezionare</p>' +
            '<button class="btn btn-outline" style="pointer-events:none;">Sfoglia file</button>' +
        '</div>' +
        '<div class="import-info-box">' +
            '<strong>Formati supportati:</strong> CSV, TSV, Excel (.xlsx, .xls)<br>' +
            'La prima riga deve contenere le intestazioni delle colonne.' +
        '</div></div>';

    // Step 2
    html += '<div class="import-step" id="importStep2">' +
        '<div class="step-header"><span class="step-pill">Passo 2 di 3</span><div><div class="step-title">Mappa colonne</div><div class="step-sub" id="step2Sub"></div></div></div>' +
        '<div id="colMapGrid"></div>' +
        '<div class="section-title" style="margin-top:16px">Anteprima dati</div>' +
        '<div class="preview-wrap"><table class="preview-table" id="previewTable"></table></div>' +
    '</div>';

    // Step 3
    html += '<div class="import-step" id="importStep3">' +
        '<div class="step-header"><span class="step-pill">Passo 3 di 3</span><div><div class="step-title">Conferma importazione</div></div></div>' +
        '<div class="import-summary" id="importSummary"></div>' +
        '<div class="section-title">Modalità importazione</div>' +
        '<div class="merge-options">' +
            '<div class="merge-opt selected" id="mopt_add" onclick="selectMerge(\'add\')">' +
                '<div class="merge-opt-title">Aggiungi / Unisci</div>' +
                '<div class="merge-opt-desc">Aggiunge i nuovi clienti e aggiorna quelli con lo stesso nome</div>' +
            '</div>' +
            '<div class="merge-opt" id="mopt_replace" onclick="selectMerge(\'replace\')">' +
                '<div class="merge-opt-title">Sostituisci tutto</div>' +
                '<div class="merge-opt-desc">Elimina tutti i clienti esistenti e importa solo quelli del file</div>' +
            '</div>' +
        '</div>' +
        '<div class="section-title">Anteprima finale</div>' +
        '<div class="preview-wrap"><table class="preview-table" id="finalPreviewTable"></table></div>' +
    '</div>';

    // Actions
    html += '<div class="modal-actions">' +
        '<button class="btn btn-outline" id="importBackBtn" style="display:none" onclick="importBack()">Indietro</button>' +
        '<button class="btn btn-primary ml-auto" id="importNextBtn" style="display:none" onclick="importNext()">Avanti</button>' +
    '</div>';

    document.getElementById('importContent').innerHTML = html;
    document.getElementById('importModal').classList.remove('hidden');

    // Set file input handler
    const fi = document.getElementById('fileInput');
    fi.onchange = function(e) { handleTableFile(e); };
    fi.accept = type === 'excel' ? '.xlsx,.xls' : '.csv,.tsv,.txt';
}

function showImportStep(n) {
    importStep = n;
    [1,2,3].forEach(i => {
        const el = document.getElementById('importStep'+i);
        if (el) el.classList.toggle('active', i===n);
    });
    const backBtn = document.getElementById('importBackBtn');
    const nextBtn = document.getElementById('importNextBtn');
    if (backBtn) backBtn.style.display = n > 1 ? '' : 'none';
    if (nextBtn) {
        if (n === 1) { nextBtn.style.display = 'none'; }
        if (n === 2) { nextBtn.textContent = 'Avanti \u2192'; nextBtn.style.display = ''; }
        if (n === 3) { nextBtn.textContent = 'Importa Clienti'; nextBtn.style.display = ''; }
    }
}

function importNext() {
    if (importStep === 2) {
        importMapping = {};
        document.querySelectorAll('[data-map-field]').forEach(sel => {
            const field = sel.dataset.mapField;
            if (sel.value) importMapping[field] = sel.value;
        });
        importMapping._accColumns = [];
        document.querySelectorAll('[data-acc-col]').forEach(sel => {
            if (sel.value !== '__none__') {
                importMapping._accColumns.push({ header: sel.dataset.accCol, role: sel.value });
            }
        });
        buildStep3();
        showImportStep(3);
    } else if (importStep === 3) {
        doTableImport();
    }
}
function importBack() { if (importStep > 1) showImportStep(importStep - 1); }

function dzOver(e) { e.preventDefault(); document.getElementById('dropZone').classList.add('drag-over'); }
function dzLeave() { document.getElementById('dropZone').classList.remove('drag-over'); }
function dzDrop(e) {
    e.preventDefault();
    document.getElementById('dropZone').classList.remove('drag-over');
    const file = e.dataTransfer.files[0];
    if (file) processTableFile(file);
}

function handleTableFile(e) {
    const file = e.target.files[0];
    if (file) processTableFile(file);
    e.target.value = '';
}

function processTableFile(file) {
    const ext = file.name.split('.').pop().toLowerCase();
    if (ext === 'xlsx' || ext === 'xls') {
        const reader = new FileReader();
        reader.onload = ev => {
            try {
                const wb = XLSX.read(ev.target.result, {type:'array'});
                const ws = wb.Sheets[wb.SheetNames[0]];
                const data = XLSX.utils.sheet_to_json(ws, {header:1, defval:''});
                if (!data || data.length < 2) { toast('File vuoto o non valido','err'); return; }
                importHeaders = data[0].map(h => String(h).trim());
                importRawData = data.slice(1).filter(row => row.some(c => String(c).trim()));
                importRawData = importRawData.map(row => row.map(c => String(c).trim()));
                importMapping = autoDetectMapping(importHeaders);
                buildStep2(file.name);
                showImportStep(2);
            } catch(err) { toast('Errore nel leggere il file: ' + err.message, 'err'); }
        };
        reader.readAsArrayBuffer(file);
    } else {
        const reader = new FileReader();
        reader.onload = ev => {
            try {
                const text = ev.target.result;
                const parsed = parseCSV(text);
                if (!parsed || parsed.length < 2) { toast('File vuoto o non valido','err'); return; }
                importHeaders = parsed[0];
                importRawData = parsed.slice(1).filter(row => row.some(c=>c.trim()));
                importMapping = autoDetectMapping(importHeaders);
                buildStep2(file.name);
                showImportStep(2);
            } catch(err) { toast('Errore: ' + err.message, 'err'); }
        };
        reader.readAsText(file, 'UTF-8');
    }
}

function parseCSV(text) {
    const firstLine = text.split('\n')[0];
    let delim = ',';
    const semicolons = (firstLine.match(/;/g)||[]).length;
    const tabs = (firstLine.match(/\t/g)||[]).length;
    const commas = (firstLine.match(/,/g)||[]).length;
    if (semicolons > commas && semicolons >= tabs) delim = ';';
    else if (tabs > commas && tabs >= semicolons) delim = '\t';

    const rows = []; let row = []; let field = ''; let inQuotes = false; let i = 0;
    text = text.replace(/\r\n/g,'\n').replace(/\r/g,'\n');
    if (text.charCodeAt(0) === 0xFEFF) text = text.slice(1);

    while (i < text.length) {
        const ch = text[i];
        if (inQuotes) {
            if (ch === '"') { if (text[i+1] === '"') { field += '"'; i += 2; continue; } else { inQuotes = false; } }
            else { field += ch; }
        } else {
            if (ch === '"') { inQuotes = true; }
            else if (ch === delim) { row.push(field.trim()); field = ''; }
            else if (ch === '\n') { row.push(field.trim()); field = ''; if (row.some(c=>c)) rows.push(row); row = []; i++; continue; }
            else { field += ch; }
        }
        i++;
    }
    if (field || row.length) { row.push(field.trim()); if(row.some(c=>c)) rows.push(row); }
    return rows;
}

function autoDetectMapping(headers) {
    const mapping = {};
    headers.forEach(h => {
        const hl = h.toLowerCase().trim();
        for (const [field, aliases] of Object.entries(FIELD_ALIASES)) {
            if (mapping[field]) continue;
            if (aliases.some(a => hl === a || hl.includes(a))) mapping[field] = h;
        }
    });
    return mapping;
}

function detectAccColumns(headers) {
    const result = [];
    headers.forEach(h => {
        const hl = h.toLowerCase().trim();
        let matchedType = null;
        for (const [type, aliases] of Object.entries(ACC_TYPE_ALIASES)) {
            for (const alias of aliases) { if (hl.includes(alias)) { matchedType = type; break; } }
            if (matchedType) break;
        }
        if (!matchedType) return;
        let role;
        if (hl.includes('pass') || hl.includes('pwd') || hl.includes('psw') || hl.includes('password')) role = matchedType + '_pass';
        else role = matchedType + '_user';
        result.push({ header: h, detectedType: matchedType, role });
    });
    return result;
}

function buildStep2(filename) {
    document.getElementById('step2Sub').textContent = 'File: ' + filename + ' \u2014 ' + importRawData.length + ' righe trovate.';
    const FIELD_LABELS = { cliente:'Cliente *', referente:'Referente', email:'Email', telefono:'Telefono', indirizzo:'Indirizzo', citta:'Città', provincia:'Provincia', cap:'CAP', note:'Note' };
    const noneOpt = '<option value="">\u2014 non importare \u2014</option>';
    let html = '<div class="section-title" style="margin-bottom:10px">Campi anagrafici</div><div class="col-map-grid">';
    for (const [field, label] of Object.entries(FIELD_LABELS)) {
        const sel = importMapping[field] || '';
        html += '<div class="col-map-item"><div class="col-map-label">' + label + '</div>' +
            '<select data-map-field="' + field + '" onchange="onMapChange(this)" class="' + (sel?'mapped':'') + '">' +
                noneOpt + importHeaders.map(h=>'<option value="' + esc(h) + '"' + (h===sel?' selected':'') + '>' + esc(h) + '</option>').join('') +
            '</select></div>';
    }
    html += '</div>';

    const accCols = detectAccColumns(importHeaders);
    const mappedHeaders = new Set(Object.values(importMapping));
    const unmappedHeaders = importHeaders.filter(h => !mappedHeaders.has(h));

    if (unmappedHeaders.length > 0) {
        html += '<div class="section-title" style="margin-top:16px;margin-bottom:10px">Colonne Account</div>';
        html += '<p style="font-size:12px;color:var(--text-muted);margin-bottom:12px">Per ogni colonna, indica se contiene username o password:</p>';
        html += '<div class="col-map-grid">';
        const roleOptions = [{v:'__none__', l:'\u2014 ignora \u2014'},...ACCOUNT_TYPES.flatMap(t => [{v:t+'_user',l:t+' \u2014 Username'},{v:t+'_pass',l:t+' \u2014 Password'}])];
        unmappedHeaders.forEach(h => {
            const detected = accCols.find(a=>a.header===h);
            const autoRole = detected ? detected.role : '__none__';
            html += '<div class="col-map-item"><div class="col-map-label" title="' + esc(h) + '">' + esc(h) + '</div>' +
                '<select data-acc-col="' + esc(h) + '" class="' + (autoRole!=='__none__'?'mapped':'') + '">' +
                    roleOptions.map(o=>'<option value="' + esc(o.v) + '"' + (o.v===autoRole?' selected':'') + '>' + esc(o.l) + '</option>').join('') +
                '</select></div>';
        });
        html += '</div>';
    }

    document.getElementById('colMapGrid').innerHTML = html;
    buildPreviewTable(importHeaders, importRawData.slice(0,5), 'previewTable');
}

function onMapChange(sel) { sel.classList.toggle('mapped', !!sel.value); }

function buildPreviewTable(headers, rows, tableId) {
    const table = document.getElementById(tableId);
    if (!table) return;
    const maxCols = Math.min(headers.length, 10);
    let html = '<thead><tr>' + headers.slice(0,maxCols).map(h=>'<th>' + esc(h) + '</th>').join('') + (headers.length>maxCols?'<th>\u2026</th>':'') + '</tr></thead>';
    html += '<tbody>';
    rows.forEach(row => {
        html += '<tr>' + row.slice(0,maxCols).map(c=>'<td title="' + esc(c) + '">' + esc(c) + '</td>').join('') + (headers.length>maxCols?'<td>\u2026</td>':'') + '</tr>';
    });
    html += '</tbody>';
    table.innerHTML = html;
}

function buildStep3() {
    const parsed = convertRawToClients();
    const existing = clients.length;
    document.getElementById('importSummary').innerHTML =
        '<div class="sum-card"><div class="sum-num">' + parsed.length + '</div><div class="sum-lbl">Nel file</div></div>' +
        '<div class="sum-card"><div class="sum-num">' + existing + '</div><div class="sum-lbl">Esistenti</div></div>' +
        '<div class="sum-card"><div class="sum-num">' + parsed.filter(c=>c.accounts&&c.accounts.length>0).length + '</div><div class="sum-lbl">Con account</div></div>';
    const previewFields = ['cliente','referente','email','telefono','citta'];
    const table = document.getElementById('finalPreviewTable');
    let html = '<thead><tr>' + previewFields.map(f=>'<th>' + f + '</th>').join('') + '<th>Account</th></tr></thead><tbody>';
    parsed.forEach(c => {
        html += '<tr>' + previewFields.map(f=>'<td title="' + esc(c[f]||'') + '">' + esc(c[f]||'\u2014') + '</td>').join('') +
            '<td>' + ((c.accounts||[]).map(a=>'<span class="badge" style="font-size:9px">' + esc(a.type) + '</span>').join(' ')||'\u2014') + '</td></tr>';
    });
    html += '</tbody>';
    table.innerHTML = html;
}

function selectMerge(mode) {
    importMergeMode = mode;
    document.getElementById('mopt_add').classList.toggle('selected', mode==='add');
    document.getElementById('mopt_replace').classList.toggle('selected', mode==='replace');
}

function convertRawToClients() {
    const get = (row, header) => header ? (row[importHeaders.indexOf(header)] || '').toString().trim() : '';
    return importRawData.map(row => {
        const c = {
            id: genId(), createdAt: Date.now(),
            cliente: get(row, importMapping.cliente), referente: get(row, importMapping.referente),
            email: get(row, importMapping.email), telefono: get(row, importMapping.telefono),
            indirizzo: get(row, importMapping.indirizzo), citta: get(row, importMapping.citta),
            provincia: get(row, importMapping.provincia), cap: get(row, importMapping.cap),
            note: get(row, importMapping.note), accounts: []
        };
        const accMap = {};
        (importMapping._accColumns || []).forEach(col => {
            const val = get(row, col.header); if (!val) return;
            const parts = col.role.split('_');
            const role = parts[parts.length - 1];
            const type = parts.slice(0, -1).join('_');
            const accType = ACCOUNT_TYPES.find(t=>t===type||t.toLowerCase()===type.toLowerCase()) || type;
            if (!accMap[accType]) accMap[accType] = { type: accType, username:'', password:'', note:'' };
            if (role === 'user') accMap[accType].username = val;
            else if (role === 'pass') accMap[accType].password = val;
        });
        c.accounts = Object.values(accMap).filter(a=>a.username||a.password);
        return c;
    }).filter(c => c.cliente);
}

async function doTableImport() {
    const parsed = convertRawToClients();
    if (!parsed.length) { toast('Nessun cliente valido trovato','err'); return; }
    const btn = document.getElementById('importNextBtn');
    if (btn) { btn.disabled = true; btn.textContent = 'Importazione\u2026'; }
    try {
        const toWrite = [];
        if (importMergeMode === 'replace') {
            const existing = await db.collection(COL).get();
            if (!existing.empty) {
                const delDocs = existing.docs;
                for (let i = 0; i < delDocs.length; i += 500) {
                    const batch = db.batch();
                    delDocs.slice(i, i + 500).forEach(d => batch.delete(d.ref));
                    await batch.commit();
                }
            }
            clients = parsed;
            parsed.forEach(c => toWrite.push(c));
        } else {
            const existingMap = {};
            clients.forEach((c,i) => { existingMap[(c.cliente||'').toLowerCase().trim()] = i; });
            parsed.forEach(c => {
                const key = (c.cliente||'').toLowerCase().trim();
                if (existingMap[key] !== undefined) {
                    const merged = { ...clients[existingMap[key]], ...c, id: clients[existingMap[key]].id };
                    clients[existingMap[key]] = merged;
                    toWrite.push(merged);
                } else { clients.push(c); toWrite.push(c); }
            });
        }
        for (let i = 0; i < toWrite.length; i += 500) {
            const batch = db.batch();
            toWrite.slice(i, i + 500).forEach(c => { batch.set(db.collection(COL).doc(c.id), c); });
            await batch.commit();
        }
        closeModal('importModal'); renderGrid();
        toast(parsed.length + ' clienti importati', 'ok');
    } catch(e) { toast('Errore importazione: ' + e.message, 'err'); }
    finally { if (btn) { btn.disabled = false; btn.textContent = 'Importa Clienti'; } }
}

/* ── Export ── */
function exportCSV() {
    const rows = [['Cliente','Referente','Email','Telefono','Indirizzo','Città','Provincia','CAP','Note','Tipo Account','Username','Password','Nota Account']];
    clients.forEach(c => {
        const base = [c.cliente,c.referente,c.email,c.telefono,c.indirizzo,c.citta,c.provincia,c.cap,c.note];
        if ((c.accounts||[]).length) { c.accounts.forEach(a => rows.push([...base, a.type, a.username, a.password, a.note])); }
        else { rows.push([...base,'','','','']); }
    });
    const csv = rows.map(r=>r.map(v=>'"'+(v||'').replace(/"/g,'""')+'"').join(',')).join('\n');
    dl(new Blob(['\ufeff'+csv], {type:'text/csv;charset=utf-8'}), 'clienti_' + today() + '.csv');
    toggleDD(false); toast('CSV esportato','ok');
}
function exportJSON() {
    const blob = new Blob([JSON.stringify(clients, null, 2)], {type:'application/json'});
    dl(blob, 'clienti_' + today() + '.json');
    toggleDD(false); toast('JSON esportato','ok');
}
function dl(blob, name) {
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href=url; a.download=name; a.click();
    URL.revokeObjectURL(url);
}
function today() { return new Date().toISOString().slice(0,10); }

function triggerImportJSON() {
    const fi = document.getElementById('fileInput');
    fi.accept = '.json';
    fi.onchange = handleImportJSON;
    fi.click();
    toggleDD(false);
}
function handleImportJSON(e) {
    const file = e.target.files[0]; if (!file) return;
    const r = new FileReader();
    r.onload = async ev => {
        try {
            const data = JSON.parse(ev.target.result);
            if (!Array.isArray(data)) throw new Error();
            const merge = clients.length > 0 && confirm('Hai già ' + clients.length + ' clienti.\n\nOK = Aggiungi\nAnnulla = Sostituisci tutto');
            const toWrite = [];
            if (merge) {
                const ids = new Set(clients.map(c=>c.id));
                data.forEach(c => { if(!c.id) c.id=genId(); if(!ids.has(c.id)){clients.push(c);toWrite.push(c);} else{const i=clients.findIndex(x=>x.id===c.id);if(i!==-1){clients[i]=c;toWrite.push(c);}} });
            } else {
                const existing = await db.collection(COL).get();
                if (!existing.empty) {
                    for (let i = 0; i < existing.docs.length; i += 500) {
                        const batch = db.batch();
                        existing.docs.slice(i, i + 500).forEach(d => batch.delete(d.ref));
                        await batch.commit();
                    }
                }
                clients = data.map(c=>({...c, id:c.id||genId()}));
                clients.forEach(c => toWrite.push(c));
            }
            for (let i = 0; i < toWrite.length; i += 500) {
                const batch = db.batch();
                toWrite.slice(i, i + 500).forEach(c => { batch.set(db.collection(COL).doc(c.id), c); });
                await batch.commit();
            }
            renderGrid(); toast(data.length + ' clienti importati','ok');
        } catch(err) { toast('File JSON non valido','err'); }
    };
    r.readAsText(file); e.target.value='';
}

/* ── Dropdown ── */
function toggleDD(force) {
    const m = document.getElementById('ddMenu');
    const show = force !== undefined ? force : m.classList.contains('hidden');
    m.classList.toggle('hidden', !show);
}
document.addEventListener('click', e => {
    const dd = document.getElementById('ddData');
    if (dd && !dd.contains(e.target)) {
        document.getElementById('ddMenu').classList.add('hidden');
    }
});

/* ── Modals ── */
function closeModal(id) { document.getElementById(id).classList.add('hidden'); }

// Click outside to close
['detailModal','editModal','importModal','changePwdModal'].forEach(id => {
    document.getElementById(id)?.addEventListener('click', function(e) {
        if (e.target === this) closeModal(id);
    });
});

/* ── Confirm Dialog ── */
function showConfirm(msg, callback) {
    document.getElementById('confirmMsg').textContent = msg;
    confirmCallback = callback;
    document.getElementById('confirmOverlay').classList.remove('hidden');
}
function closeConfirm() {
    document.getElementById('confirmOverlay').classList.add('hidden');
    confirmCallback = null;
}
document.getElementById('confirmAction').onclick = function() {
    if (confirmCallback) confirmCallback();
    closeConfirm();
};

/* ── Toast ── */
function toast(msg, type) {
    const w = document.getElementById('toastWrap');
    const el = document.createElement('div');
    el.className = 'toast' + (type ? ' ' + type : '');
    const prefix = type === 'ok' ? '\u2713 ' : type === 'err' ? '\u2717 ' : '';
    el.textContent = prefix + msg;
    w.appendChild(el);
    setTimeout(() => { el.classList.add('toast-exit'); setTimeout(() => el.remove(), 200); }, 3200);
}

/* ── Keyboard ── */
document.addEventListener('keydown', e => {
    if (e.key === 'Escape') {
        closeModal('detailModal'); closeModal('editModal'); closeModal('importModal'); closeModal('changePwdModal'); closeConfirm();
    }
});
